# Deploys the site to GitHub Pages — and re-creates the Pages site if it was
# disabled (which happens automatically whenever the repo is made private).
# Replaces the built-in "deploy from a branch" flow, which broke after the
# account rename + private/public flip.
name: Deploy website (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/website-outage-app-dev-gn9swr # outage-fix branch; remove after merge
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages (re-enables the site if it was disabled)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
