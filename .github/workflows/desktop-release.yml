name: Build desktop app

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Optional release tag (e.g. v1.0.0). If set, a GitHub Release with
          that tag is created/updated with the installers. Leave empty to only
          upload workflow artifacts.
        required: false
        default: ""
        type: string
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    env:
      # Never look for signing certificates — builds are intentionally unsigned.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Copy the static web app into the Electron bundle so the desktop app
      # has an offline fallback on a fully offline first run. Uses node so the
      # same step works on Windows, macOS and Linux runners.
      - name: Copy web app into desktop bundle
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const items = [
              "index.html",
              "flashcards.html",
              "study-buddy.html",
              "master-lock.js",
              "sw.js",
              "manifest.webmanifest",
              "404.html",
              "alarm.m4a",
              "icons",
            ];
            fs.rmSync("desktop/site", { recursive: true, force: true });
            fs.mkdirSync("desktop/site", { recursive: true });
            for (const item of items) {
              if (fs.existsSync(item)) {
                fs.cpSync(item, "desktop/site/" + item, { recursive: true });
                console.log("copied " + item);
              } else {
                console.warn("WARNING: missing " + item);
              }
            }
          '

      # For tag pushes (desktop-vX.Y.Z), make the package version match the tag
      # so electron-builder names artifacts and the GitHub Release consistently.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        working-directory: desktop
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#desktop-v}"

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      # Tag push: build and publish installers straight to a GitHub Release.
      - name: Build and publish to GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

      # Manual run: build only; installers are attached below.
      - name: Build installers (manual run)
        if: github.event_name == 'workflow_dispatch'
        working-directory: desktop
        run: npx electron-builder --publish never

      - name: Upload installers as workflow artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: slay-your-own-exam-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
          if-no-files-found: warn

      - name: Create/update GitHub Release (manual run with version input)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
